name: Update Comedy Schedules

on:
  schedule:
    # Run daily at 6 AM UTC (12 AM Chicago time)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual triggers

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run scraper
        id: scrape
        run: python scraper.py
        continue-on-error: true

      - name: Check scraper result
        run: |
          if [ ${{ steps.scrape.outcome }} == 'failure' ]; then
            echo "⚠️ Scraper failed - keeping existing shows.json"
            echo "This prevents the site from showing empty results"
            exit 0
          else
            echo "✓ Scraper succeeded"
          fi

      - name: Commit and push if changed
        if: steps.scrape.outcome == 'success'
        run: |
          git config --global user.name 'Comedy Calendar Bot'
          git config --global user.email 'bot@github-actions'
          git add shows.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update show schedules - $(date +'%Y-%m-%d')" && git push)
