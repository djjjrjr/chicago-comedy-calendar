name: Update Venue Information

on:
  schedule:
    # Run weekly on Sundays at 6 AM UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:  # Allow manual triggers

permissions:
  contents: write

jobs:
  scrape-venue-info:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run venue info scraper
        id: scrape-venues
        run: python utils/venue-info-scraper.py
        continue-on-error: true

      - name: Check scraper result
        run: |
          echo "Venue scraper: ${{ steps.scrape-venues.outcome }}"
          if [ ${{ steps.scrape-venues.outcome }} == 'failure' ]; then
            echo "⚠️ Venue scraper failed - keeping existing venue-info.json"
          else
            echo "✓ Venue scraper succeeded"
          fi
          exit 0

      - name: Commit and push if changed
        run: |
          git config --global user.name 'Comedy Calendar Bot'
          git config --global user.email 'bot@github-actions'
          git add venue-info.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update venue information - $(date +'%Y-%m-%d')" && git push)
