name: Update Comedy Schedules

on:
  schedule:
    # Run daily at 6 AM UTC (12 AM Chicago time)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual triggers

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run Chicago scraper
        id: scrape-chicago
        run: python scraper.py
        continue-on-error: true
      - name: Run New York scraper
        id: scrape-ny
        run: python ny-scraper.py
        continue-on-error: true
      - name: Run Los Angeles scraper
        id: scrape-la
        run: python la-scraper.py
        continue-on-error: true

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: |
            debug_*.png
            debug_*.html
          retention-days: 7

      - name: Check scraper results
        run: |
          echo "Chicago scraper: ${{ steps.scrape-chicago.outcome }}"
          echo "New York scraper: ${{ steps.scrape-ny.outcome }}"
          echo "Los Angeles scraper: ${{ steps.scrape-la.outcome }}"
          if [ ${{ steps.scrape-chicago.outcome }} == 'failure' ]; then
            echo "⚠️ Chicago scraper failed - keeping existing shows.json"
          fi
          if [ ${{ steps.scrape-ny.outcome }} == 'failure' ]; then
            echo "⚠️ New York scraper failed - keeping existing ny-shows.json"
          fi
          if [ ${{ steps.scrape-la.outcome }} == 'failure' ]; then
            echo "⚠️ Los Angeles scraper failed - keeping existing la-shows.json"
          fi
          # Exit successfully to allow commit if any scraper succeeded
          exit 0

      - name: Commit and push if changed
        run: |
          git config --global user.name 'Comedy Calendar Bot'
          git config --global user.email 'bot@github-actions'
          git add shows.json ny-shows.json la-shows.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update show schedules - $(date +'%Y-%m-%d')" && git push)
