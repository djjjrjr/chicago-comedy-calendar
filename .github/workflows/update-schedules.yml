name: Update Comedy Schedules

on:
  schedule:
    # Run daily at 6 AM UTC (12 AM Chicago time)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual triggers

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'Comedy Calendar Bot'
          git config --global user.email 'bot@github-actions'
          git add shows.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update show schedules - $(date +'%Y-%m-%d')" && git push)
