<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicago Comedy Calendar</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="title">
                    <span class="emoji">🎭</span>
                    <span class="title-text">Chicago Comedy Calendar</span>
                </h1>
                <p class="subtitle">Your one-stop shop for all the laughs in the city</p>
                <div class="last-updated" id="lastUpdated">
                    Last updated: <span id="updateTime">Loading...</span>
                </div>
            </div>
        </header>

        <div class="filters">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">All Venues</button>
                <button class="filter-btn" data-filter="second-city">Second City</button>
                <button class="filter-btn" data-filter="io-theater">iO Theater</button>
                <button class="filter-btn" data-filter="annoyance">Annoyance</button>
                <button class="filter-btn" data-filter="zanies">Zanies</button>
                <button class="filter-btn" data-filter="laugh-factory">Laugh Factory</button>
                <button class="filter-btn" data-filter="lincoln-lodge">Lincoln Lodge</button>
                <button class="filter-btn" data-filter="den-theatre">Den Theatre</button>
            </div>
            <div class="filter-group">
                <button class="sort-btn active" data-sort="date">Sort by Date</button>
                <button class="sort-btn" data-sort="venue">Sort by Venue</button>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading shows...</p>
        </div>

        <div id="showsContainer" class="shows-container" style="display: none;">
            <!-- Shows will be dynamically inserted here -->
        </div>

        <div id="noShows" class="no-shows" style="display: none;">
            <span class="emoji-large">🎪</span>
            <p>No shows found. Check back soon!</p>
        </div>
    </div>

    <footer class="footer">
        <p>Made with ❤️ for Chicago comedy lovers</p>
        <p class="footer-note">Show times and availability subject to change. Please verify on venue websites.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
