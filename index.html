<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicago Comedy Calendar</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="title">
                    <span class="emoji">🎭</span>
                    <span class="title-text">Chicago Comedy Calendar</span>
                </h1>
                <p class="subtitle">Your one-stop shop for all the laughs in the city</p>
                <div class="last-updated" id="lastUpdated">
                    Last updated: <span id="updateTime">Loading...</span>
                </div>
            </div>
        </header>

        <div class="search-controls">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search shows...">
                <input type="date" id="dateFilter" placeholder="Filter by date">
            </div>

            <div class="view-controls">
                <button class="view-btn active" data-view="date">Group by Date</button>
                <button class="view-btn" data-view="venue">Group by Venue</button>
                <button class="view-btn" data-view="list">List View</button>
            </div>

            <div class="filter-section">
                <span class="filter-label">Comedy Type</span>
                <div class="view-controls">
                    <button class="filter-btn active" data-type-filter="all">All Types</button>
                    <button class="filter-btn" data-type-filter="improv">Improv</button>
                    <button class="filter-btn" data-type-filter="standup">Standup</button>
                    <button class="filter-btn" data-type-filter="sketch">Sketch</button>
                </div>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading shows...</p>
        </div>

        <div id="showsContainer" class="shows-container" style="display: none;">
            <!-- Shows will be dynamically inserted here -->
        </div>

        <div id="noShows" class="no-shows" style="display: none;">
            <span class="emoji-large">🎪</span>
            <p>No shows found. Check back soon!</p>
        </div>
    </div>

    <!-- Venue Info Modal -->
    <div id="venueModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2 id="modalVenueName"></h2>
            <div id="modalVenueInfo" class="venue-info">
                <div class="venue-details">
                    <p class="venue-address"></p>
                    <p class="venue-phone"></p>
                    <p class="venue-website"></p>
                </div>
                <div id="mapContainer" class="map-container">
                    <!-- Google Map will be embedded here -->
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Made with ❤️ for Chicago comedy lovers</p>
        <p class="footer-note">Show times and availability subject to change. Please verify on venue websites.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
